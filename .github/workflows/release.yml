name: Release

# Arma un release COHERENTE: fotografía los `:edge` actuales de los artefactos
# (server, server-seed, web, wa-bridge, wa-bridge-win-dist, mk-bridge, vpn-hub)
# en un tag de versión inmutable y compartido `vX.Y.Z`. NO recompila nada — `docker buildx imagetools
# create` copia el manifest en el registry (instantáneo). Así todos los
# servicios quedan pineados a una sola versión y el rollback es trivial.
#
# Además, en releases ESTABLES (sin sufijo -beta/-rc) mueve `:latest` a esta
# versión: `latest` = default móvil de prod (la última release estable), `vX.Y.Z`
# = pin inmutable para rollback exacto. Los prereleases NO tocan `:latest`.
#
# Requiere el secret GHCR_PAT: un PAT classic del owner con write:packages +
# read:packages (el de solo lectura del deploy no alcanza para retaggear).
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Versión del release (ej. v2.0.0-beta.2)"
        required: true
      source:
        description: "Tag de origen a fotografiar (normalmente edge)"
        default: edge
        required: true

permissions:
  contents: read

env:
  OWNER: getwisnee

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Validar formato de versión
        run: |
          echo "${{ inputs.version }}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$' \
            || { echo "::error::Versión inválida '${{ inputs.version }}'. Usá vX.Y.Z o vX.Y.Z-suffix."; exit 1; }

      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ env.OWNER }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Retag edge → versión (sin recompilar)
        env:
          V: ${{ inputs.version }}
          S: ${{ inputs.source }}
        run: |
          set -euo pipefail
          # Servicios que componen un release coherente (mismo origen :edge).
          SERVICES=(wisnee-server wisnee wa-bridge wa-bridge-win-dist mk-bridge vpn-hub)
          retag() {  # retag <imagen> <tagOrigen> <tagDestino>
            local img="ghcr.io/${OWNER}/$1"
            echo "→ $img:$3  ⇐  $img:$2"
            docker buildx imagetools create -t "$img:$3" "$img:$2"
          }
          # 1) Snapshot inmutable vX.Y.Z (+ el seed del server para demo).
          for svc in "${SERVICES[@]}"; do retag "$svc" "$S" "$V"; done
          retag wisnee-server "${S}-seed" "${V}-seed"
          # 2) Mover :latest SOLO en releases estables (sin sufijo -beta/-rc): es
          #    el default móvil de prod. Un prerelease no debe volverse prod.
          if echo "$V" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            for svc in "${SERVICES[@]}"; do retag "$svc" "$S" latest; done
            retag wisnee-server "${S}-seed" latest-seed
            echo "::notice::':latest' movido a $V (release estable)."
          else
            echo "::notice::$V es prerelease — ':latest' queda intacto."
          fi
          echo "::notice::Release $V listo. Desplegá: ./wisnee update --tag $V"
