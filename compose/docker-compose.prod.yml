# Overlay de PRODUCCIÓN: agrega los bridges (mk-bridge, wa-bridge, vpn-hub) al
# stack base. Demo no los levanta (entorno core-only).
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

name: wisnee

services:
  # One-shot: copia los artefactos del Chat Node para Windows (instalador
  # PowerShell + paquete del bridge) al volumen que el server sirve bajo
  # /api/chat-node/*. Corre en cada deploy para refrescarlos a la versión
  # desplegada. El volumen es el mismo `server-storage` que monta el server
  # (acá en /storage → allá en /app/storage), así CHAT_NODE_DIST_DIR cae en su
  # default /app/storage/chat-node-dist sin configurar nada.
  chat-node-assets:
    image: ghcr.io/getwisnee/wa-bridge-win-dist:${WINDIST_TAG:-${TAG:-latest}}
    restart: "no"
    command:
      - sh
      - -c
      - "mkdir -p /storage/chat-node-dist && cp -f /dist/wa-bridge-win.zip /dist/chat-node.ps1 /storage/chat-node-dist/"
    volumes:
      - server-storage:/storage
    networks: [wisnee]

  # El server espera a que los artefactos estén en el volumen para no servir un
  # 404 en /api/chat-node/* justo tras el `up` (merge con el server del base).
  server:
    depends_on:
      chat-node-assets:
        condition: service_completed_successfully

  wa-bridge:
    image: ghcr.io/getwisnee/wa-bridge:${WA_TAG:-${TAG:-latest}}
    restart: unless-stopped
    env_file: [../env/wa-bridge.env]
    volumes:
      - wa-session:/app/.wwebjs_auth
    expose: ["4100"]
    networks: [wisnee]

  mk-bridge:
    image: ghcr.io/getwisnee/mk-bridge:${MK_TAG:-${TAG:-latest}}
    restart: unless-stopped
    env_file: [../env/mk-bridge.env]
    # WireGuard: capacidades y device para crear interfaces / levantar túneles.
    cap_add: [NET_ADMIN, NET_RAW]
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1
    volumes:
      - mk-wireguard:/etc/wireguard
    # UDP público para que los Mikrotik bajo CGNAT se conecten (WG reverso).
    # La API HTTP (4200) queda interna (solo el server la consume).
    ports:
      - "${WG_REVERSE_LISTEN_PORT:-51820}:51820/udp"
    expose: ["4200"]
    networks: [wisnee]
    # Arrancar después de vpn-hub: el entrypoint de mk-bridge agrega la ruta al
    # pool de gestión SSTP (10.254.0.0/24) vía la IP de vpn-hub. Esa IP Docker no
    # es estable entre recreates, por eso el entrypoint corre un "route keeper"
    # que la refresca solo — ya NO hay que reiniciar mk-bridge a mano.
    depends_on:
      - vpn-hub

  # vpn-hub: concentrador SSTP para Mikrotiks bajo CGNAT con RouterOS 6 (sin
  # WireGuard). El router abre un túnel SSTP saliente hacia acá; el server
  # consume la API de control (4300) por la red interna. mk-bridge alcanza el
  # RouterOS API / ping de los Mikrotik por la IP de gestión gracias a la ruta
  # que mantiene su route keeper hacia este container (que hace ip_forward +
  # MASQUERADE -o ppp+). Validado en Linux 2026-06-07.
  vpn-hub:
    image: ghcr.io/getwisnee/vpn-hub:${VPN_HUB_TAG:-${TAG:-latest}}
    restart: unless-stopped
    env_file: [../env/vpn-hub.env]
    cap_add: [NET_ADMIN]
    devices:
      - /dev/net/tun:/dev/net/tun
      # pppd (motor de sstp-server) crea las interfaces PPP del SSTP vía /dev/ppp.
      # Sin este device el túnel termina el TLS y el control SSTP pero NO levanta
      # PPP → "started → disconnected". Requiere el módulo ppp_generic cargado en
      # el host (lo hace Ansible: base/tasks carga ppp_generic+ppp_mppe).
      - /dev/ppp:/dev/ppp
    sysctls:
      - net.ipv4.ip_forward=1
    volumes:
      # State persistente: cert SSTP + asignación de IPs (no regenerar entre
      # deploys, rompería los túneles ya configurados).
      - vpn-hub-state:/var/lib/vpn-hub
    # SSTP público en 1443 (TCP): el 443 lo ocupa el proxy nginx. El operador
    # apunta el sstp-client a host:1443 (el script generado ya lo refleja).
    # El container escucha en SSTP_LISTEN_PORT (default 1443) — host y container
    # usan el MISMO puerto para no desalinearse si se cambia.
    ports:
      - "${SSTP_LISTEN_PORT:-1443}:${SSTP_LISTEN_PORT:-1443}/tcp"
    expose: ["4300"]
    networks: [wisnee]

volumes:
  wa-session:
  mk-wireguard:
  vpn-hub-state:
