# Overlay de PRODUCCIÓN: agrega los bridges (mk-bridge, wa-bridge, vpn-hub) al
# stack base. Demo no los levanta (entorno core-only).
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

name: wisnee

services:
  wa-bridge:
    image: ghcr.io/getwisnee/wa-bridge:${WA_TAG:-${TAG:-latest}}
    restart: unless-stopped
    env_file: [../env/wa-bridge.env]
    volumes:
      - wa-session:/app/.wwebjs_auth
    expose: ["4100"]
    networks: [wisnee]

  mk-bridge:
    image: ghcr.io/getwisnee/mk-bridge:${MK_TAG:-${TAG:-latest}}
    restart: unless-stopped
    env_file: [../env/mk-bridge.env]
    # WireGuard: capacidades y device para crear interfaces / levantar túneles.
    cap_add: [NET_ADMIN, NET_RAW]
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1
    volumes:
      - mk-wireguard:/etc/wireguard
    # UDP público para que los Mikrotik bajo CGNAT se conecten (WG reverso).
    # La API HTTP (4200) queda interna (solo el server la consume).
    ports:
      - "${WG_REVERSE_LISTEN_PORT:-51820}:51820/udp"
    expose: ["4200"]
    networks: [wisnee]

  # vpn-hub: concentrador SSTP para Mikrotiks bajo CGNAT con RouterOS 6 (sin
  # WireGuard). El router abre un túnel SSTP saliente hacia acá; el server
  # consume la API de control (4300) por la red interna.
  #
  # VERIFICAR EN LINUX (no probado): falta validar el ruteo entre containers.
  # Para que mk-bridge alcance el RouterOS API de los Mikrotik por la IP de
  # gestión (pool SSTP, default 10.254.0.0/24), mk-bridge necesita una ruta
  # a ese pool vía la IP de vpn-hub en la red `wisnee` (y vpn-hub ya hace
  # ip_forward). Hoy mk-bridge no agrega esa ruta — resolver en el ops step
  # (ruta estática en el host/container o `network_mode: service:vpn-hub`).
  vpn-hub:
    image: ghcr.io/getwisnee/vpn-hub:${VPN_HUB_TAG:-${TAG:-latest}}
    restart: unless-stopped
    env_file: [../env/vpn-hub.env]
    cap_add: [NET_ADMIN]
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1
    volumes:
      # State persistente: cert SSTP + asignación de IPs (no regenerar entre
      # deploys, rompería los túneles ya configurados).
      - vpn-hub-state:/var/lib/vpn-hub
    # SSTP público en 1443 (TCP): el 443 lo ocupa el proxy nginx. El operador
    # apunta el sstp-client a host:1443 (el script generado ya lo refleja).
    # SSTP_LISTEN_PORT debe valer 1443 en ../env/vpn-hub.env.
    ports:
      - "${SSTP_LISTEN_PORT:-1443}:1443/tcp"
    expose: ["4300"]
    networks: [wisnee]

volumes:
  wa-session:
  mk-wireguard:
  vpn-hub-state:
